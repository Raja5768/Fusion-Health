services:
  - type: web
    name: fusion-health-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fusion-health-db
          property: connectionString
      - key: FUSION_HEALTH_API_KEY
        generateValue: true

databases:
  - name: fusion-health-db
    plan: free
    databaseName: fusion_health
    user: fusion_health
